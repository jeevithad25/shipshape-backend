spring.application.name=shipshape

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/shipshape?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=abcd
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT Configuration
jwt.secret=ShipShapeSecretKeyForHS256JWTSigningMustBeAtLeast256BitsLongForSecurity
jwt.expiration=86400000

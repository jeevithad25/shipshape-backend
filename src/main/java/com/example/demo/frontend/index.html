<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ShipShape — Fleet &amp; Logistics</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚓</text></svg>" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Bootstrap 5 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">

<!-- ShipShape theme (design tokens + overrides on top of Bootstrap) -->
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Global API error banner (Bootstrap alert) -->
  <div id="error-banner-root"></div>

  <!-- Navbar (Bootstrap navbar) -->
  <header id="navbar-root"></header>

  <main id="app" class="container-xxl py-4"></main>

  <!-- Toast stack (Bootstrap toasts) -->
  <div id="toast-root" class="toast-container position-fixed bottom-0 end-0 p-3" aria-live="polite" aria-atomic="true"></div>

  <!-- Config -->
  <script src="js/config.js"></script>

  <!-- Vendor: Axios (HTTP client), Bootstrap bundle (incl. Popper), Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.7/axios.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>

  <!-- Core -->
  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script src="js/api.js"></script>

  <!-- Components -->
  <script src="js/components/toast.js"></script>
  <script src="js/components/errorBanner.js"></script>
  <script src="js/components/navbar.js"></script>
  <script src="js/components/emptyState.js"></script>
  <script src="js/components/capacityBar.js"></script>
  <script src="js/components/searchFilterBar.js"></script>

  <!-- Pages -->
  <script src="js/pages/login.js"></script>
  <script src="js/pages/register.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/vessels.js"></script>
  <script src="js/pages/voyages.js"></script>
  <script src="js/pages/cargo.js"></script>
  <script src="js/pages/ports.js"></script>

  <!-- Router / bootstrap -->
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
